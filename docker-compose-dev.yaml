services:
    db:
        image: mysql:8.0
        env_file:
            - ./backend/.env
        environment:
            MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
        volumes:
            - mysql-data:/var/lib/mysql
            - ./database/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
        networks:
            - task_network
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile.dev
        depends_on: [db]
        env_file:
            - ./backend/.env
        ports:
            - "3000:3000"
        networks:
            - task_network
        volumes:
            - ./backend:/app
            - /app/node_modules
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        depends_on: [backend]
        ports:
            - "5000:5000"
        networks:
            - task_network
        volumes:
            - ./frontend:/app
            - /app/node_modules
networks:
    task_network:
        driver: bridge
volumes:
    mysql-data:
