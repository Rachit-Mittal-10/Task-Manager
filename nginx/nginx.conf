server {
    listen 80;
    server_name localhost;

    # Rule for all routes starting with /api
    location /api {
        proxy_pass http://backend:3000/; # Use your backend service name and port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Catch-all rule for the frontend
    location / {
        proxy_pass http://frontend:80; # Use your frontend service name and port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}